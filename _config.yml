#

exclude:
  - bower_components
  - node_modules
  - script

sass:
  style: :compressed

#theme: jekyll-theme-minimal
#theme: jekyll-theme-modernist
#remote_theme: jekyll-theme-mozg
#remote_theme: mozgbrasil/jekyll-theme-mozg

# Build settings

highlighter: rouge
markdown: kramdown
redcarpet:
  extensions: ["no_intra_emphasis", "fenced_code_blocks", "autolink", "tables", "with_toc_data"]
plugins: [jekyll-paginate]
paginate: 30
paginate_path: "page:num"
layout: default
permalink: /:categories/:title
excerpt_separator: "[-----]"

# html minify
    # http://jch.penibelst.de/

compress_html:
  clippings: all
  comments: all
  endings: all
  ignore:
    envs: [local]
  blanklines: false
  profile: false
  startings: [html, head, body]


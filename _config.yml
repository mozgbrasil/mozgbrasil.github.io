# Build settings

highlighter: rouge
markdown: kramdown
redcarpet:
  extensions: ["no_intra_emphasis", "fenced_code_blocks", "autolink", "tables", "with_toc_data"]
gems: [jekyll-paginate]
paginate: 30
paginate_path: "page:num"
layout: default
permalink: /:categories/:title
excerpt_separator: "[-----]"

# html minify
compress_html:
  clippings: all
  comments: all
  endings: []
  profile: true


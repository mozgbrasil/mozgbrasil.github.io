---
layout: default
---
{% comment %}
{{ site | debug }}
{{ page | debug }}
{{ site.posts | debug }}
{{ paginator | debug }}
{% endcomment %}

<div role="main" class="main">
    <section class="section section-dark section-need-help light-blue">
        <div class="site-width">
            <div class="cols-row">
                <div class="section-success-copy">
                    <h1>
                    {{ page.title }}
                    </h1>
                    <p class="font-large">
                    {{ page.excerpt }}
                    </p>
                </div>
                <div class="col-6 col-offset-1 align-self-end section-success-card hidden-xs"></div>
            </div>
        </div>
    </section>
    <div id="maia-signature"></div>
    <section id="section-one" class="section article-body light-gray">
        <div class="site-width">
            {{ content }}
        </div>
    </section>
    <div id="maia-signature"></div>
    <section class="section section-solutions ">
        <div class="site-width">
            {% include snippet-disqus.html %}
        </div>
    </section>
</div>

---
layout: default
---
{% comment %}
{{ site | debug }}
{{ page | debug }}
{{ site.posts | debug }}
{{ paginator | debug }}
{% endcomment %}

{% comment %}
<div class="row area--white">
    <div class="inner-container div--no-padding-top">
        <div class="col-md-12">
            <div class="section-success-copy">
                <h1>
                    {{ page.title }}
                </h1>
                <p class="font-large">
                    {{ page.excerpt }}
                </p>
            </div>
        </div>
    </div>
</div>
{% endcomment %}
<div class="row area--white">
    <div class="inner-container div--half-padding-bottom area--padding-large">
        <div class="col-md-12">
            {{ content }}
        </div>
    </div>
</div>
<div class="row area--white">
    <div class="inner-container div--no-padding-top">
        <div class="col-md-12 text-center">
            {% include snippet-disqus.html %}
        </div>
    </div>
</div>

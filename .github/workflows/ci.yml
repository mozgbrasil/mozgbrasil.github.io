name: mozgbrasil.github.io CI/CD 🚀

on:
  push:
    branches: [main, master]
    paths:
      - 'projects/github-profile/**'
      - 'projects/mozgbrasil.github.io/**'
      - '.github/workflows/**'
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *' # Diariamente às 04:00 UTC

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: '--max_old_space_size=4096'

jobs:
  test:
    name: check GH_TOKEN
    runs-on: ubuntu-latest
    steps:
      - name: Teste autenticação
        run: |
          pwd
          ls -la
          REMOTE_URL=https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/mozgbrasil/mozgbrasil.git
          echo "Tentando autenticar..."
          git ls-remote $REMOTE_URL
          echo "Autenticação bem-sucedida!"

  linkChecker:
    # needs: test
    name: linkChecker 🔗
    runs-on: ubuntu-latest
    permissions:
      issues: write # required for peter-evans/create-issue-from-file
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: 'projects/mozgbrasil.github.io/index.html'

      - name: Create Issue From File
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, automated issue

  lighthouse:
    name: lighthouse 🚦
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit URLs using Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://mozgbrasil.github.io/
            https://mozg.com.br/
          budgetPath: ./budget.json # test performance budgets
          uploadArtifacts: true # save results as an action artifacts
          temporaryPublicStorage: true # upload lighthouse report to the temporary storage



  


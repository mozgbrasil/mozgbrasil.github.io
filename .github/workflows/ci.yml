name: repo Full CI/CD 🚀

on:
  push:
    branches: [main, master]
    paths:
      - 'projects/github-profile/**'
      - 'projects/mozgbrasil.github.io/**'
      - '.github/workflows/**'
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *' # Diariamente às 04:00 UTC

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: '--max_old_space_size=4096'

jobs:




  lowlighter:
    name: lowlighter/metrics 🖼️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🗃️ Base content - Default metrics
        uses: lowlighter/metrics@master
        with:
          filename: ./metrics/metrics.base.svg
          token: ${{ secrets.GH_TOKEN }}
          base: header, activity, community, repositories, metadata
          output_action: none
          delay: 120
          user: mozgbrasil
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}

      - name: ⏰ WakaTime - WakaTime
        uses: lowlighter/metrics@master
        with:
          filename: ./metrics/metrics.plugin.wakatime.svg
          token: ${{ secrets.GH_TOKEN }}
          base: ''
          plugin_wakatime: yes
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          output_action: none
          delay: 120
          user: mozgbrasil
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}


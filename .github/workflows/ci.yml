name: mozgbrasil.github.io ci

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'projects/mozgbrasil.github.io/**'
      - '.github/matrix.json'
      - '.github/scripts/**'
      - '.github/workflows/reusable-project-ci.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'projects/mozgbrasil.github.io/**'
      - '.github/matrix.json'
      - '.github/scripts/**'
      - '.github/workflows/reusable-project-ci.yml'

permissions:
  actions: write
  contents: read
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/reusable-project-ci.yml
    with:
      project_name: mozgbrasil.github.io
      project_path: projects/mozgbrasil.github.io
      runtime: bash
      version: ''
      format: true
      lint: true
      test: true
      build_cmd: bash scripts/build.sh all
      dist_dir: .
      deploy: pages
      gh_pages_repo: mozgbrasil/mozgbrasil.github.io
    secrets: inherit

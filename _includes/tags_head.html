<!-- Standard Meta -->
<link rel="alternate" href="https://mozg.com.br/" />
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<!-- Refer HTML5BP and https://developers.google.com/speed/docs/insights/ConfigureViewport -->
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
<!-- Site Properities -->
{% seo %}
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.url }}" />
<link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<!-- TAGS GOOGLE -->
<!-- Google Authorship Markup -->
<link rel="author" href="https://plus.google.com/117231578401378218759?rel=author">
<!-- Social: Google+ / Schema.org  -->
<meta itemprop="name" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}"/>
<meta itemprop="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<meta itemprop="image" content="{{ "/assets/images/logos/logo_32_32.png" | prepend: site.baseurl | prepend: site.url }}"/>
<!-- THEME -->
{% if jekyll.environment == "production" %}
<style>
{% include style.css %}
</style>
{% else %}
<link rel="stylesheet" href="/assets/css/style.css">
{% endif %}
<!-- publisher -->
<link href="https://plus.google.com/117178438811960262290" rel="publisher" />
<!-- Google+ JavaScript API -->
<script type="text/javascript" async defer
src="https://apis.google.com/js/platform.js?publisherid=117178438811960262290"></script>
{% comment %}
<!-- snippet-page-level ads -->
<script type="text/javascript" async src="//pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
<script>
  (adsbygoogle = window.adsbygoogle || []).push({
    google_ad_client: "ca-pub-7927094983433027",
    enable_page_level_ads: true
  });
</script>
{% endcomment %}
<!-- snippet-google-analytics -->
{% include snippet-google-analytics.html %}
<!-- /TAGS GOOGLE -->

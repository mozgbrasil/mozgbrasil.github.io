
<!-- Standard Meta -->
<link rel="alternate" href="https://mozg.com.br/" />
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<!-- Refer HTML5BP and https://developers.google.com/speed/docs/insights/ConfigureViewport -->
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">

<!-- Site Properities -->

{% seo %}

<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.url }}" />
<link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/x-icon" href="/favicon.ico">

<!-- TAGS GOOGLE -->

<!-- Google Authorship Markup -->
<link rel="author" href="https://plus.google.com/117231578401378218759?rel=author">

<!-- Social: Google+ / Schema.org  -->
<meta itemprop="name" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}"/>
<meta itemprop="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<meta itemprop="image" content="{{ "/assets/images/logos/logo_32_32.png" | prepend: site.baseurl | prepend: site.url }}"/>

<!-- publisher -->
<link href="https://plus.google.com/117178438811960262290" rel="publisher" />

<!-- Google+ JavaScript API -->
<script type="text/javascript" async defer
src="https://apis.google.com/js/platform.js?publisherid=117178438811960262290"></script>

<!-- snippet-page-level ads -->
<script type="text/javascript" async src="//pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
<script>
  (adsbygoogle = window.adsbygoogle || []).push({
    google_ad_client: "ca-pub-7927094983433027",
    enable_page_level_ads: true
  });
</script>

<!-- snippet-google-analytics -->
{% include snippet-google-analytics.html %}

<!-- /TAGS GOOGLE -->

<!-- TAGS TWITTER -->

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="{{ site.url }}">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
{% if page.image %}
<meta property="twitter:image" content="{{ site.url }}{{page.image }}">
<meta property="twitter:image:src" content="{{ site.url }}{{page.image }}">
{% else %}
<meta property="twitter:image" content="{{ "/assets/images/backgrounds/background.jpg" | prepend: site.baseurl | prepend: site.url }}">
<meta property="twitter:image:src" content="{{ "/assets/images/backgrounds/background.jpg" | prepend: site.baseurl | prepend: site.url }}">
{% endif %}
<meta name="twitter:creator" content="@{{ site.twitter_username }}">

<!-- / TAGS TWITTER -->

<!-- TAGS FACEBOOK -->

<!-- https://developers.facebook.com/docs/web/tutorials/scrumptious/open-graph-object -->
{% if site.facebook_app %}
<meta property="fb:app_id" content="{{ site.facebook_app }}">
{% endif %}
<meta property="og:url" content="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
{% if page.image %}
<meta property="og:image" content="{{ site.url }}{{page.image }}">
{% else %}
<meta property="og:image" content="{{ "/assets/images/logos/logo_32_32.png" | prepend: site.baseurl | prepend: site.url }}">
{% endif %}
<meta property="og:locale" content="pt_BR" />
<meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:site_name" content="{{ site.title }}">
{% if page.layout == 'post' %}
<meta property="og:type" content="article" />
{% else %}
<meta property="og:type" content="website" />
{% endif %}

<!-- /TAGS FACEBOOK -->

<!-- THEME -->
<link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
<!-- THEME -->

<ol class="breadcrumb">
    {% for category in site.categories limit:site.recent_items %}
        <li>
            <button class="btn btn-primary" type="button">
              <a class="" style="color:white" href="/category/#{{ category | first }}">{{ category | first }}</a> <span class="badge">{{ category | last | size }}</span>
            </button>
        </li>
    {% endfor %}
</ol>

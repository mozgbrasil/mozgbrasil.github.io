<ol class="breadcrumb">
    {% for tag in site.tags limit:site.recent_items %}
        <li>
            <button class="btn btn-primary" type="button">
              <a class="" style="color:white" href="/tag/#{{ tag | first }}">{{ tag | first }}</a> <span class="badge">{{ tag | last | size }}</span>
            </button>
        </li>
    {% endfor %}
</ol>
